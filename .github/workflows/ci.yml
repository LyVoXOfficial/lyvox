name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint and Type Check
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c153fac1f8c89f752d5fcbc5da
        
      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: 10.17.0
          
      - name: Setup Node.js
        uses: actions/setup-node@1a4442caab129ea3c800f0cb4468e8766355f421
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run linter
        run: pnpm run lint
        
      - name: Run type check
        run: pnpm run typecheck

  # Job 2: Build Check
  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c153fac1f8c89f752d5fcbc5da
        
      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: 10.17.0
          
      - name: Setup Node.js
        uses: actions/setup-node@1a4442caab129ea3c800f0cb4468e8766355f421
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build project
        run: pnpm run build
        env:
          # Add any required env vars for build
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # Job 3: i18n Keys Consistency Check
  i18n-check:
    name: i18n Keys Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c153fac1f8c89f752d5fcbc5da
        
      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: 10.17.0
          
      - name: Setup Node.js
        uses: actions/setup-node@1a4442caab129ea3c800f0cb4468e8766355f421
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Check i18n keys consistency
        run: node scripts/check-i18n-keys.js

  # Job 4: Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c153fac1f8c89f752d5fcbc5da

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@1a4442caab129ea3c800f0cb4468e8766355f421
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

  # Job 5: Audit Dependencies (RULE-05: next must not appear in audit)
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c153fac1f8c89f752d5fcbc5da

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@1a4442caab129ea3c800f0cb4468e8766355f421
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run audit (RULE-05)
        run: |
          set -e
          AUDIT_OUTPUT=$(pnpm audit --prod 2>&1)
          echo "$AUDIT_OUTPUT"
          if echo "$AUDIT_OUTPUT" | grep -q "next"; then
            echo "❌ RULE-05 violation: Vulnerable Next.js detected. Update next + eslint-config-next before pushing."
            exit 1
          fi
          echo "✅ Audit passed: no vulnerable Next.js versions"

  # Job 6: Secret Scanning (gitleaks)
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c153fac1f8c89f752d5fcbc5da

      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Summary job - requires all other jobs to pass
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, i18n-check, test, audit, secrets]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint-and-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.i18n-check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.audit.result }}" != "success" ]] || \
             [[ "${{ needs.secrets.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          else
            echo "✅ All CI jobs passed successfully!"
          fi


