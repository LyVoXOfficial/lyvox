name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# All jobs are read-only. Any future job that needs more access must declare it
# locally and justify the additional permission in review.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.17.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

  build:
    name: Production Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.17.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm build
        env:
          # CI validates the bundle without contacting production services.
          VERCEL_ENV: preview
          NEXT_PUBLIC_SUPABASE_URL: https://ci.invalid
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key

      - name: Check bundle budget
        working-directory: apps/web
        run: pnpm check:bundle-budget

  i18n-check:
    name: i18n Key Parity
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.17.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Check locale key parity
        run: node scripts/check-i18n-keys.js

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.17.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  security-guards:
    name: Migration & Security Guards
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.17.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migration and security regression guards
        run: >-
          pnpm exec vitest run
          apps/web/src/lib/db/__tests__/authz-migration-guard.test.ts
          apps/web/src/lib/security/__tests__/env-hygiene-guard.test.ts
          apps/web/src/lib/security/__tests__/route-csrf-completeness.test.ts
          apps/web/src/lib/validations/__tests__/route-validation-completeness.test.ts

      - name: Verify production CI and deploy policy
        run: >-
          node --test
          scripts/check-production-audit.test.mjs
          scripts/deploy-vercel-production.test.mjs
          scripts/verify-production-ci.test.mjs

  audit:
    name: Production Dependency Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.17.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Audit production dependency graph
        shell: bash
        env:
          AUDIT_FILE: ${{ runner.temp }}/pnpm-audit.json
        run: |
          set +e
          pnpm audit --prod --json > "${AUDIT_FILE}"
          set -e

          node scripts/check-production-audit.mjs "${AUDIT_FILE}"

      - name: Audit complete workspace toolchain
        shell: bash
        env:
          AUDIT_FILE: ${{ runner.temp }}/pnpm-audit-workspace.json
        run: |
          set +e
          pnpm audit --json > "${AUDIT_FILE}"
          set -e

          node scripts/check-production-audit.mjs "${AUDIT_FILE}" "Full workspace"

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb

    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install verified Gitleaks CLI
        shell: bash
        run: |
          archive="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl --fail --silent --show-error --location \
            --proto '=https' --tlsv1.2 \
            --connect-timeout 15 --retry 3 --retry-all-errors \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" gitleaks
          chmod +x "${RUNNER_TEMP}/gitleaks"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Scan complete repository history
        run: gitleaks git --redact --no-banner

  ci-success:
    name: CI Success
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    needs:
      - lint-and-typecheck
      - build
      - i18n-check
      - test
      - security-guards
      - audit
      - secrets
    if: ${{ always() }}

    steps:
      - name: Require every release job to pass
        shell: bash
        run: |
          if [[ "${{ needs.lint-and-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.i18n-check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.security-guards.result }}" != "success" ]] || \
             [[ "${{ needs.audit.result }}" != "success" ]] || \
             [[ "${{ needs.secrets.result }}" != "success" ]]; then
            echo "One or more required CI jobs failed, were skipped, or were cancelled."
            exit 1
          fi

          echo "All required CI jobs passed."
