name: Vercel Production Deployment

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read
  checks: read
  deployments: write

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy CI-verified SHA
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.url }}
    env:
      CI: "true"
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
      EXPECTED_CI_RUN_ID: ${{ github.event.workflow_run.id }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Check out the exact CI-verified commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Require Vercel deployment credentials
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::GitHub environment Production is missing secret ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build staged exact-SHA release and promote it
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node scripts/deploy-vercel-production.mjs
