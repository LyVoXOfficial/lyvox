version: 2
updates:
  # npm/pnpm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - power4ik
    assignees:
      - power4ik
    # RULE-05: Next.js advisories block deployment and must be reviewed immediately.
    commit-message:
      prefix: "deps:"
      include: scope
    allow:
      - dependency-type: "all"
    rebase-strategy: auto

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
    reviewers:
      - power4ik
    assignees:
      - power4ik
    commit-message:
      prefix: "ci:"
    allow:
      - dependency-type: "all"
    # Actions pinned to SHA (see workflow file)
    # Dependabot will update them
